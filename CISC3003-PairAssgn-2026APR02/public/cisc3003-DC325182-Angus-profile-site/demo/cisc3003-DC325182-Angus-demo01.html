<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISC3003 Practice 08</title>

    <link href="http://fonts.googleapis.com/css?family=Merriweather" rel="stylesheet" type="text/css">
    <link href="http://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="../../css/cisc3003-DC325182-Angus-css/cisc3003-DC325182-Angus-demo01.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="tiled">
<header>
    <h1>Art Filters</h1>
</header>

<main>
    <div id="sliderBox">
        <form>
            <p>
                <label>Opacity: </label>
                <input type="range" id="sliderOpacity" min="0" max="100" value="100" class="sliders">
                <span id="numOpacity">100</span>%
            </p>

            <p>
                <label>Saturation: </label>
                <input type="range" id="sliderSaturation" min="1" max="300" value="100" class="sliders">
                <span id="numSaturation">100</span>%
            </p>

            <p>
                <label>Brightness: </label>
                <input type="range" id="sliderBrightness" min="0" max="300" value="100" class="sliders">
                <span id="numBrightness">100</span>%
            </p>

            <p>
                <label>Hue Rotate: </label>
                <input type="range" id="sliderHue" min="0" max="360" value="0" class="sliders">
                <span id="numHue">0</span>deg
            </p>

            <p>
                <label>Grayscale: </label>
                <input type="range" id="sliderGray" min="0" max="100" value="0" class="sliders">
                <span id="numGray">0</span>%
            </p>

            <p>
                <label>Blur: </label>
                <input type="range" id="sliderBlur" min="0" max="10" value="0" class="sliders">
                <span id="numBlur">0</span>px
            </p>

            <p>
                <button id="resetFilters">Reset</button>
            </p>
        </form>
    </div>

    <figure id="imgManipulated">
        <img src="../../images/cisc3003-DC325182-Angus-demo01/medium/painting1.jpg" alt="Still Life with Flowers in a Glass Vase">
        <figcaption>
            <em>Still Life with Flowers in a Glass Vase</em><br>
            Jan Davidsz. de Heem, 1650 - 1683
        </figcaption>
    </figure>

    <div id="thumbBox">
        <div><img src="../../images/cisc3003-DC325182-Angus-demo01/small/painting1.jpg" alt="Still Life with Flowers in a Glass Vase" title="Jan Davidsz. de Heem, 1650 - 1683"></div>
        <div><img src="../../images/cisc3003-DC325182-Angus-demo01/small/painting2.jpg" alt="Portrait of Alida Christina Assink" title="Jan Adam Kruseman, 1833"></div>
        <div><img src="../../images/cisc3003-DC325182-Angus-demo01/small/painting3.jpg" alt="Self-portrait" title="Vincent van Gogh, 1887"></div>
        <div><img src="../../images/cisc3003-DC325182-Angus-demo01/small/painting4.jpg" alt="William II, Prince of Orange, and his Bride, Mary Stuart" title="Anthony van Dyck, 1641"></div>
        <div><img src="../../images/cisc3003-DC325182-Angus-demo01/small/painting5.jpg" alt="Milkmaid" title="Johannes Vermeer, c. 1660"></div>
    </div>
</main>

<script>
$(document).ready(function () {

    function applyFilters() {
        let opacity = $("#sliderOpacity").val();
        let saturation = $("#sliderSaturation").val();
        let brightness = $("#sliderBrightness").val();
        let hue = $("#sliderHue").val();
        let gray = $("#sliderGray").val();
        let blur = $("#sliderBlur").val();

        $("#numOpacity").text(opacity);
        $("#numSaturation").text(saturation);
        $("#numBrightness").text(brightness);
        $("#numHue").text(hue);
        $("#numGray").text(gray);
        $("#numBlur").text(blur);

        let filterValue =
            "opacity(" + opacity + "%) " +
            "saturate(" + saturation + "%) " +
            "brightness(" + brightness + "%) " +
            "hue-rotate(" + hue + "deg) " +
            "grayscale(" + gray + "%) " +
            "blur(" + blur + "px)";

        $("#imgManipulated img").css("filter", filterValue);
        $("#imgManipulated img").css("-webkit-filter", filterValue);
    }

    $("#thumbBox img").click(function () {
        let smallSrc = $(this).attr("src");
        let mediumSrc = smallSrc.replace("small", "medium");
        let titleText = $(this).attr("alt");
        let artistText = $(this).attr("title");

        $("#imgManipulated img").attr("src", mediumSrc);
        $("#imgManipulated img").attr("alt", titleText);

        $("#imgManipulated figcaption").html("<em>" + titleText + "</em><br>" + artistText);
    });

    $(".sliders").on("input", function () {
        applyFilters();
    });

    $("#resetFilters").click(function (event) {
        event.preventDefault();

        $("#sliderOpacity").val(100);
        $("#sliderSaturation").val(100);
        $("#sliderBrightness").val(100);
        $("#sliderHue").val(0);
        $("#sliderGray").val(0);
        $("#sliderBlur").val(0);

        applyFilters();
    });

    applyFilters();
});
</script>
</body>
</html>
