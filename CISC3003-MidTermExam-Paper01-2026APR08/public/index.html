<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DC32542 CHANG I WAI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container" id="container">
    <div class="form-container sign-up">
        <form>
            <h1>Join Us</h1>
            <div class="social-icons">
                <a href="#">f</a>
                <a href="#">G+</a>
                <a href="#">in</a>
            </div>
            <span>Use your email to sign up</span>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Create Password" required>
            <button type="submit" class="btn-main">REGISTER</button>
        </form>
    </div>

    <div class="form-container sign-in">
        <form>
            <h1>Log In</h1>
            <div class="social-icons">
                <a href="#">f</a>
                <a href="#">G+</a>
                <a href="#">in</a>
            </div>
            <span>Use your account to sign in</span>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <a href="#" class="forgot">Forgot Password??</a>
            <button type="submit" class="btn-main">SIGN IN</button>
        </form>
    </div>

    <div class="toggle-container">
        <div class="toggle">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Again!</h1>
                <img src="images/website_7376495.png" alt="Welcome Back" width="150">
                <p>Log in to stay connected with us</p>
                <button class="hidden" id="login">SIGN IN</button>
            </div>
            <div class="toggle-panel toggle-right">
                <h1>Welcome!</h1>
                <img src="images/unsecure_10399884.png" alt="New Journey" width="150">
                <p>Enter your details to start your journey</p>
                <button class="hidden" id="register">SIGN UP</button>
            </div>
        </div>
    </div>

</div> <footer class="page-footer">
        CISC3003 Web Programming: DC32542 Chang I Wai 2026
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
